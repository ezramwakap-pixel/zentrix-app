<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZentrixApp - Graphics & Tech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* MISINGI NA RANGI */
        :root {
            --bg-color: #0c111c;
            --card-color: #1a1e2b;
            --text-color: #ffffff;
            --text-dim: #9ca3af;
            --accent-color: #fca52d; /* Rangi ya machungwa/dhahabu kwa 'App' */
            --primary-blue: #2563eb; /* Rangi ya kitufe cha lugha */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden; /* Zuia scroll ya kushoto-kulia */
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: var(--bg-color);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-icon {
            font-size: 1.5rem;
            color: #4b5563; /* Rangi ya kijivu iliyofifia */
            cursor: pointer;
        }

        .app-logo {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .app-logo .app-text {
            color: var(--accent-color);
        }

        .lang-button {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* MAUDHUI MKUU */
        main {
            padding: 15px;
            box-sizing: border-box;
        }

        /* Kadi ya Ad (Advertisement) */
        .ad-card {
            background-image: linear-gradient(135deg, #24305c, #1a1e2b); /* Gradient ya bluu nzito */
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
        }

        .ad-tag {
            background-color: #f59e0b; /* Rangi ya ad tag */
            color: black;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 4px;
            position: absolute;
            top: 15px;
            right: 15px;
        }

        .ad-card h2 {
            margin: 0 0 10px 0;
            font-size: 1.3rem;
        }

        .ad-card p {
            margin: 0;
            font-size: 0.8rem;
            color: #d1d5db;
        }

        /* Kadi ya Posti (Graphic Design) */
        .post-card {
            background-color: var(--card-color);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .post-image-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .post-image {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        .post-title {
            font-size: 1.3rem;
            margin: 0 0 10px 0;
            font-weight: 500;
        }

        .post-description {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin: 0 0 15px 0;
            line-height: 1.5;
        }

        /* Vijitendo vya Kijamii (Social Actions) */
        .social-actions {
            display: flex;
            justify-content: flex-start;
            gap: 25px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 10px;
        }

        .action-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-dim);
            font-size: 0.9rem;
            cursor: pointer;
        }

        .action-item:hover {
            color: white;
        }

        /* MAREKEBISHO YA SKRINI NDOGO */
        @media (max-width: 600px) {
            .app-logo {
                font-size: 1.1rem;
            }
            .ad-card h2, .post-title {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <i class="fas fa-bars menu-icon"></i>
            <div class="app-logo">Zentrix<span class="app-text">App</span></div>
        </div>
        <button class="lang-button">Kiswahili</button>
    </header>

    <main>
        <div class="ad-card">
            <span class="ad-tag">AD</span>
            <h2>Grow Your Business</h2>
            <p>Contact us to feature your ads here.</p>
        </div>

        <div class="post-card">
            <div class="post-image-container">
                <img src="https://i.postimg.cc/85z11jYj/design-swatches.png" alt="Color swatches and design pad" class="post-image">
            </div>
            
            <h1 class="post-title">Introduction to Graphic Design</h1>
            
            <p class="post-description">Learn the basics of color theory and layout design.</p>
            
            <div class="social-actions">
                <div class="action-item">
                    <i class="far fa-heart"></i>
                    <span>Like</span>
                </div>
                <div class="action-item">
                    <i class="far fa-comment"></i>
                    <span>Comment</span>
                </div>
                <div class="action-item">
                    <i class="fas fa-share-alt"></i>
                    <span>Share</span>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
