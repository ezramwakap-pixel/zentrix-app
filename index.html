<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentrix Premium - Graphics & Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0b0e14;
            --card: #1a1d26;
            --primary: #2563eb;
            --accent: #f59e0b;
            --success: #10b981;
            --text: #ffffff;
            --text-dim: #9ca3af;
            --danger: #ef4444;
        }

        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            padding-bottom: 20px; 
            overflow-x: hidden;
        }

        /* OVERLAY - Inazuia kubofya nje wakati sidebar ipo wazi */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 998;
            backdrop-filter: blur(3px);
        }

        /* SIDEBAR */
        .sidebar { 
            position: fixed; 
            left: -280px; 
            top: 0; 
            width: 260px; 
            height: 100%; 
            background: var(--card); 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1000; 
            padding: 25px; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.5); 
        }
        .sidebar.open { left: 0; }
        .sidebar-item { 
            padding: 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-size: 14px; 
            border-radius: 8px;
            transition: 0.2s;
        }
        .sidebar-item:hover { background: rgba(255,255,255,0.1); color: var(--accent); }

        /* HEADER */
        header { 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--card); 
            position: sticky; 
            top: 0; 
            z-index: 900; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        .lang-switch { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 6px 15px; 
            border-radius: 20px; 
            font-size: 12px; 
            cursor: pointer; 
            font-weight: 600;
        }

        /* SECTIONS */
        .section { display: none; padding: 20px; animation: slideUp 0.4s ease-out; }
        .active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* FEED & CARDS */
        .card { 
            background: var(--card); 
            border-radius: 20px; 
            padding: 15px; 
            margin-bottom: 25px; 
            border: 1px solid rgba(255,255,255,0.05); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .post-img { 
            width: 100%; 
            height: auto; 
            max-height: 250px; 
            border-radius: 15px; 
            object-fit: cover; 
            margin-bottom: 15px; 
        }
        .social-bar { 
            display: flex; 
            justify-content: space-around; 
            padding-top: 15px; 
            border-top: 1px solid rgba(255,255,255,0.05); 
            margin-top: 10px; 
        }
        .social-item { cursor: pointer; font-size: 13px; color: var(--text-dim); display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .social-item:hover { color: var(--primary); }

        /* INPUTS & BUTTONS */
        .input-box { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.3); 
            color: white; 
            margin-bottom: 15px; 
            box-sizing: border-box; 
            font-family: inherit;
        }
        .input-box:focus { border-color: var(--primary); outline: none; }
        
        .btn { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: none; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
            font-size: 15px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-wa { background: #25d366; color: white; margin-top: 10px; text-decoration: none; }

        /* ADS */
        .ad-banner { 
            background: linear-gradient(135deg, #1e3a8a, #312e81); 
            padding: 20px; 
            border-radius: 18px; 
            margin-bottom: 25px; 
            border: 1px solid var(--accent); 
            position: relative;
        }

        /* LOGO */
        .logo-box { 
            width: 60px; 
            height: 60px; 
            background: var(--primary); 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 28px; 
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4); 
        }

        h2, h3, h4 { margin-top: 0; }
    </style>
</head>
<body>
